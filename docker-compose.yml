version: "3.8"

services:
  akc:
    build: .
    ports:
      - "8080:8080"
    environment:
      LLM_MODEL: ${LLM_MODEL:-gpt-4o-mini}
      LLM_BASE_URL: ${LLM_BASE_URL:-http://localhost:8000}
      LLM_API_KEY: ${LLM_API_KEY}
      MEMORY_ID: ${MEMORY_ID}
      AKC_KB_DIR: /app/data
    volumes:
      - ./kb_data:/app/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 5s
      timeout: 2s
      retries: 3
      start_period: 10s
